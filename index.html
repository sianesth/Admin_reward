<!doctype html>
<html lang="th">
<head>
<meta http-equiv="Cache-Control" content="no-store" />
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ยืนยันการแลก (Admin)</title>
<style>
  :root{ --bg:#f6f8fd;--card:#fff;--line:#e6e9f2;--txt:#0f1733;--muted:#6b78a6;--ok:#0a8c4a;--danger:#d93025;--btn:#1f6fff;}
  body{margin:0;background:var(--bg);font:16px/1.6 system-ui,-apple-system,Segoe UI,Inter,Roboto,Arial,sans-serif;color:var(--txt);}
  .wrap{max-width:620px;margin:24px auto;padding:16px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 30px rgba(15,23,51,.06);padding:20px;}
  h1{margin:0 0 8px;font-size:22px}
  .row{display:flex;gap:12px;align-items:center;margin:10px 0}
  .key{width:140px;color:var(--muted)}
  input,select,button{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
  input,select{flex:1}
  .btn{background:var(--btn);color:#fff;border:none;cursor:pointer}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .hint{color:var(--muted);font-size:13px}
  .ok{color:var(--ok)} .err{color:var(--danger)}
  .pill{display:inline-block;background:#eef3ff;border:1px solid #dfe7ff;padding:4px 10px;border-radius:999px;font-size:13px}
  .mt{margin-top:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>✅ ยืนยันการแลก (Admin)</h1>
    <p class="hint">ตรวจสอบข้อมูลการแลกรางวัลให้ถูกต้อง</p>

    <div class="row"><div class="key">SAP</div><div id="sap" class="pill">—</div></div>
    <div class="row"><div class="key">ชื่อผู้แลก</div><div id="userName" class="pill">กำลังดึง…</div></div>
    <div class="row"><div class="key">รางวัล</div><div id="reward" class="pill">—</div></div>
    <div class="row"><div class="key">แต้มที่ใช้</div><div id="points" class="pill">—</div></div>

    <div class="row mt">
      <div class="key">รับแลกโดย</div>
      <input id="adminName" placeholder="ชื่อจริง admin">
      <input id="adminSAP" type="hidden" value="">
    </div>
    <div class="row">
      <div class="key">หรือเลือก</div>
      <select id="adminSelect"><option value="">— โหลดรายชื่อแอดมิน… —</option></select>
    </div>

    <div class="row mt">
      <button id="btnConfirm" class="btn">ยืนยันแลก</button>
      <button id="btnCancel" type="button">ยกเลิก</button>
      <button id="btnCheck" type="button" style="display:none">ตรวจสอบสถานะ</button>
    </div>

    <p id="msg" class="mt hint"></p>
  </div>
</div>

<footer style="text-align:center;color:#8b94b2;font-size:11px;margin:8px 0">
  © 2025 | ภาควิชาวิสัญญีวิทยา คณะแพทยศาสตร์ศิริราชพยาบาล<br>
  <span style="font-size:10px;opacity:.85">Version 1.2.0 Sheet-First Fast Confirm</span>
</footer>

<script>
/* ========= CONFIG ========= */
const GAS_URL = "https://script.google.com/macros/s/AKfycbxF1vw8ZjfbzDw6WzhfJT1b-f9lh4FIbRAuZYmRkq07-YpMIWTuBBTZuvrhTu-PlEOiEQ/exec";
const DB_URL  = "https://anesaplus-default-rtdb.asia-southeast1.firebasedatabase.app";

/* ========= helpers ========= */
function $(id){ return document.getElementById(id); }
function fmt(n){ return Number(n || 0).toLocaleString('th-TH'); }
function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
function explain(err){
  const e = String(err || '').toLowerCase();
  if(e === 'missing_params') return 'ข้อมูลไม่ครบ (SAP, รางวัล, แต้ม, แอดมิน)';
  if(e === 'user_not_found') return 'ไม่พบผู้ใช้ในระบบ';
  if(e === 'user_non_active') return 'ผู้ใช้อยู่สถานะไม่พร้อมใช้งาน';
  if(e === 'reward_not_found') return 'ไม่พบชื่อรางวัล';
  if(e === 'out_of_stock') return 'ของรางวัลหมดสต็อก';
  if(e === 'not_enough_points') return 'แต้มไม่เพียงพอ';
  if(e === 'points_less_than_required') return 'แต้มที่ใช้ไม่ครบตามรางวัล';
  if(e === 'feature_closed') return 'ระบบแลกรางวัลฝั่งผู้ใช้ปิดอยู่';
  if(e === 'system_busy') return 'ระบบกำลังบันทึกรายการอื่นอยู่ ระบบจะลองยืนยันให้อัตโนมัติ';
  return 'ไม่สามารถบันทึกได้ (' + (err || 'unknown') + ')';
}
function setMessage(text, kind){
  const msg = $('msg');
  msg.className = 'mt ' + (kind || 'hint');
  msg.textContent = text;
}
function setMessageHtml(html, kind){
  const msg = $('msg');
  msg.className = 'mt ' + (kind || 'hint');
  msg.innerHTML = html;
}
function escapeHtml(v){
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

/* JSONP สำหรับ Apps Script */
function jsonp(params, timeoutMs){
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Math.random().toString(36).slice(2);
    const query = new URLSearchParams({ ...params, callback: cb, _: Date.now().toString() });
    const s = document.createElement('script');
    const timeout = Number(timeoutMs || 15000);
    let settled = false;
    const timer = setTimeout(() => fail(new Error('timeout')), timeout);
    function cleanup(){
      try { delete window[cb]; } catch(_) { window[cb] = undefined; }
      try { s.remove(); } catch(_) {}
      clearTimeout(timer);
    }
    function finish(value){
      if(settled) return;
      settled = true;
      cleanup();
      resolve(value);
    }
    function fail(err){
      if(settled) return;
      settled = true;
      cleanup();
      reject(err);
    }
    window[cb] = finish;
    s.onerror = () => fail(new Error('network_error'));
    s.src = GAS_URL + '?' + query.toString();
    document.body.appendChild(s);
  });
}

/* ========= decode payload จาก QR ========= */
function decodePayload(){
  const first = (...xs) => xs.find(v => v !== undefined && v !== null && String(v).trim() !== '') ?? '';
  try{
    const hp = new URLSearchParams(location.hash.slice(1));
    const b64 = hp.get('p');
    if(b64){
      const json = decodeURIComponent(escape(window.atob(b64)));
      const o = JSON.parse(json);
      const sap = first(o.sap, o.SAP, o.userSap, o.user, o.uid);
      const reward = first(o.rewardName, o.reward, o.rewardTitle, o.title, o.label, o.name);
      const pts = Number(first(o.points, o.pts, o.pointsRequired, o.cost, o.needPoints, o.requiredPoints, o.required));
      const ts = first(o.ts, o.timestamp, o.time);
      return { sap:String(sap || '').trim(), reward:String(reward || '').trim(), pts:isNaN(pts) ? 0 : pts, ts:String(ts || '').trim() };
    }
  }catch(_){}
  const q = new URLSearchParams(location.search);
  const sap = first(q.get('sap'), q.get('SAP'), q.get('userSap'), q.get('user'), q.get('uid'));
  const reward = first(q.get('rewardName'), q.get('reward'), q.get('rewardTitle'), q.get('title'), q.get('label'), q.get('name'));
  const pts = Number(first(q.get('points'), q.get('pts'), q.get('pointsRequired'), q.get('cost'), q.get('needPoints'), q.get('requiredPoints'), q.get('required')));
  const ts = first(q.get('ts'), q.get('timestamp'), q.get('time'));
  return { sap:String(sap || '').trim(), reward:String(reward || '').trim(), pts:isNaN(pts) ? 0 : pts, ts:String(ts || '').trim() };
}

/* ========= deterministic redeem id =========
 * ใช้ QR เดิม = id เดิมเสมอ เพื่อให้ retry/timeout ไม่ตัดแต้มซ้ำ */
function fnv1a(str){
  let h = 0x811c9dc5;
  for(let i=0; i<str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return (h >>> 0).toString(36);
}
function redeemIdFor(data){
  const key = 'anesa_redeem_id:' + location.href;
  try{
    const stored = sessionStorage.getItem(key);
    if(stored) return stored;
  }catch(_){}
  const seed = [data.sap, data.reward, data.pts, data.ts || location.href].join('|');
  const id = 'redeem_' + fnv1a(seed) + '_' + fnv1a(seed.split('').reverse().join(''));
  try { sessionStorage.setItem(key, id); } catch(_) {}
  return id;
}

/* ========= RTDB reads ========= */
async function fetchUserNameFromRTDB(sap){
  if(!sap) return null;
  try{
    const r = await fetch(`${DB_URL}/public/usersSummary/${encodeURIComponent(sap)}.json?t=${Date.now()}`, {cache:'no-store'});
    if(!r.ok) return null;
    const v = await r.json();
    return v && typeof v === 'object' ? (v.name || v.Name || null) : null;
  }catch(_){ return null; }
}
async function fetchRedeemReceipt(redeemId){
  if(!redeemId) return null;
  try{
    const r = await fetch(`${DB_URL}/public/redeemReceipts/${encodeURIComponent(redeemId)}.json?t=${Date.now()}`, {cache:'no-store'});
    if(!r.ok) return null;
    const v = await r.json();
    return v && typeof v === 'object' && (v.confirmed === true || v.status === 'CONFIRMED') ? v : null;
  }catch(_){ return null; }
}

/* ========= Admin list ========= */
async function loadAdmins(){
  const sel = $('adminSelect');
  sel.innerHTML = '<option value="">— เลือกชื่อแอดมิน —</option>';
  try{
    const res = await jsonp({ action:'getAdmins' }, 15000);
    const items = (res && res.items) || [];
    if(Array.isArray(items) && items.length){
      for(const it of items){
        const name = String(it.name || it || '');
        const opt = document.createElement('option');
        opt.value = String(it.sap || '');
        opt.dataset.name = name;
        opt.textContent = it.sap ? `${name} (${it.sap})` : name;
        sel.appendChild(opt);
      }
      return;
    }
  }catch(_){}
  ['Tachawan','Dudsadee','Juthawut'].forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.dataset.name = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

/* ========= request / recovery ========= */
async function confirmRedeemViaGAS(payload){
  /* The server now commits Sheets first and returns before Firebase work.
     A short retry handles an active Sheet lock without making Admin wait 45 s. */
  let last = null;
  for(let attempt = 0; attempt < 5; attempt++){
    try{
      const r = await jsonp({ action:'confirmRedeem', ...payload }, 12000);
      last = r;
      if(r && String(r.error || '').toLowerCase() === 'system_busy'){
        await sleep(600 + (attempt * 350));
        continue;
      }
      return r;
    }catch(err){
      if(attempt === 4) throw err;
      await sleep(600 + (attempt * 350));
    }
  }
  return last || { ok:false, error:'system_busy' };
}
/* Firebase sync is intentionally fire-and-forget: Admin success reflects
   the durable Sheets transaction and never waits for Firebase/OAuth. */
function kickRedeemRealtimeSync(data, redeemId){
  jsonp({
    action:'redeemsync', sap:data.sap, rewardName:data.reward, reward:data.reward,
    points:data.pts, pts:data.pts, ts:data.ts, redeemId
  }, 20000).catch(()=>{});
}

async function redeemStatusViaGAS(data, redeemId){
  try{
    const r = await jsonp({
      action:'redeemstatus', sap:data.sap, rewardName:data.reward, points:data.pts,
      ts:data.ts, redeemId
    }, 15000);
    return r && r.confirmed ? r : null;
  }catch(_){ return null; }
}
async function waitForRedeemReceipt(data, redeemId, tries, delay){
  const n = Number(tries || 12);
  for(let i=0; i<n; i++){
    const receipt = await fetchRedeemReceipt(redeemId);
    if(receipt) return receipt;
    if(i < n - 1) await sleep(Number(delay || 1500));
  }
  return redeemStatusViaGAS(data, redeemId);
}

/* ========= UI state ========= */
function lockConfirmed(){
  $('btnConfirm').disabled = true;
  $('btnCancel').disabled = true;
  $('btnCheck').style.display = 'none';
  $('adminName').disabled = true;
  $('adminSelect').disabled = true;
}
function unlockBusinessError(){
  $('btnConfirm').disabled = false;
  $('btnCancel').disabled = false;
}
function showConfirmed(res, recovered){
  const total = res && res.totalAfter;
  const stock = res && res.stockAfter;
  const suffix = recovered ? '<br><span class="hint">ตรวจพบรายการที่บันทึกสำเร็จแล้วจากฐานข้อมูล</span>' : '';
  setMessageHtml(
    `✅ ดำเนินการแลกรางวัลสำเร็จ<br>แต้มคงเหลือผู้ใช้: <b>${total === null || total === undefined ? '—' : fmt(total)}</b> | สต็อกรางวัลคงเหลือ: <b>${stock === null || stock === undefined ? '—' : fmt(stock)}</b>${suffix}`,
    'ok'
  );
  lockConfirmed();
}
function showChecking(){
  $('btnConfirm').disabled = true;
  $('btnCancel').disabled = false;
  $('btnCheck').style.display = '';
  setMessage('⚠️ ยังไม่ได้รับผลตอบกลับจากหน้าเว็บ ระบบกำลังตรวจสอบรายการที่บันทึกไว้ กรุณาอย่ากดยืนยันซ้ำ', 'hint');
}

/* ========= MAIN ========= */
(async () => {
  const data = decodePayload();
  const redeemId = redeemIdFor(data);
  $('sap').textContent = data.sap || '—';
  $('reward').textContent = data.reward || '—';
  $('points').textContent = data.pts ? fmt(data.pts) : '—';

  let userName = await fetchUserNameFromRTDB(data.sap);
  if(!userName){
    try{
      const r = await jsonp({ action:'userstatus', sap:data.sap }, 15000);
      userName = r && r.name ? r.name : null;
    }catch(_){}
  }
  $('userName').textContent = userName || '—';
  await loadAdmins();

  $('adminSelect').addEventListener('change', e => {
    const sel = e.target;
    const sap = String(sel.value || '').trim();
    const opt = sel.options[sel.selectedIndex];
    const name = opt && opt.dataset ? String(opt.dataset.name || '').trim() : '';
    if(sap){
      $('adminSAP').value = sap;
      if(name) $('adminName').value = name;
    }
  });

  let locking = false;

  async function verifyOnly(){
    if(locking) return;
    locking = true;
    $('btnCheck').disabled = true;
    setMessage('กำลังตรวจสอบสถานะการยืนยัน…', 'hint');
    const receipt = await waitForRedeemReceipt(data, redeemId, 4, 1200);
    if(receipt){
      showConfirmed(receipt, true);
    }else{
      $('btnCheck').disabled = false;
      setMessage('⚠️ ยังไม่พบผลยืนยัน กรุณารอสักครู่แล้วกด “ตรวจสอบสถานะ” อีกครั้ง โดยไม่ต้องกดยืนยันแลกซ้ำ', 'hint');
    }
    locking = false;
  }

  $('btnCheck').addEventListener('click', verifyOnly);

  /* หากเปิด QR เดิมซ้ำหลังยืนยันแล้ว ให้แสดงสำเร็จทันทีและกันตัดซ้ำ */
  const existing = await fetchRedeemReceipt(redeemId);
  if(existing){
    showConfirmed(existing, true);
    return;
  }

  $('btnConfirm').addEventListener('click', async () => {
    if(locking) return;
    if(!data.sap || !data.reward || !data.pts){
      setMessage('❌ ข้อมูลไม่ครบจาก QR', 'err');
      return;
    }

    const adminNameInput = $('adminName').value.trim();
    const adminSAP = $('adminSAP').value.trim() || $('adminSelect').value.trim();
    const opt = $('adminSelect').options[$('adminSelect').selectedIndex];
    const adminNameAuto = opt && opt.dataset ? String(opt.dataset.name || '').trim() : '';
    const adminName = adminNameInput || adminNameAuto;
    if(!adminName && !adminSAP){
      setMessage('กรุณาเลือกหรือพิมพ์ชื่อแอดมิน', 'err');
      $('adminName').focus();
      return;
    }

    locking = true;
    $('btnConfirm').disabled = true;
    $('btnCancel').disabled = true;
    $('btnCheck').style.display = 'none';
    setMessage('กำลังบันทึก…', 'hint');

    const payload = {
      sap:data.sap, rewardName:data.reward, reward:data.reward,
      points:data.pts, pts:data.pts, adminName, adminSAP,
      ts:data.ts, redeemId
    };

    try{
      const res = await confirmRedeemViaGAS(payload);
      if(res && res.ok){
        showConfirmed(res, !!res.alreadyConfirmed);
        kickRedeemRealtimeSync(data, redeemId);
        return;
      }
      if(res && String(res.error || '').toLowerCase() === 'system_busy'){
        showChecking();
        setMessage('⚠️ ระบบกำลังจัดคิวรายการอื่นอยู่ กรุณารอ 3–5 วินาทีแล้วกด “ตรวจสอบสถานะ” โดยไม่ต้องกดยืนยันซ้ำ', 'hint');
        locking = false;
        return;
      }
      unlockBusinessError();
      setMessage('❌ ' + explain(res && res.error), 'err');
      locking = false;
    }catch(_){
      /* ข้อสำคัญ: อย่าแจ้งว่า "ทำไม่สำเร็จ" ทันที เพราะ Sheet อาจบันทึกเสร็จแล้วแต่ callback มาช้า */
      const receipt = await waitForRedeemReceipt(data, redeemId, 12, 1500);
      if(receipt){
        showConfirmed(receipt, true);
        return;
      }
      showChecking();
      locking = false;
    }
  });

  $('btnCancel').addEventListener('click', () => history.back());
})();
</script>
</body>
</html>
